      # --- Node/TypeScript ---
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: '22'
      #     cache: 'npm'
      # - run: npm ci
      # - run: npm run lint

      - run: echo "Configure lint steps for your language above"

  # ============================================================
  # Test
  # ============================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      # redis:
      #   image: redis:7-alpine
      #   ports:
      #     - 6379:6379
      #   options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 5

    env:
      DATABASE_URL: postgres://testuser:testpassword@localhost:5432/testdb?sslmode=disable
      APP_ENV: test
      SECRET_KEY: test-secret-key-not-for-production

    steps:
      - uses: actions/checkout@v4

      # --- Go ---
      # - uses: actions/setup-go@v5
