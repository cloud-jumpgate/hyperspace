  # ============================================================
  # Build
  # ============================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, vuln-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t [PROJECT_NAME]:${{ github.sha }} .

