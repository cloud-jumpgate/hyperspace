name: CI

on:
  push:
    branches:
      - main
      - 'sprint/*'
  pull_request:
    branches:
      - main
      - 'sprint/*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  harness-check:
    name: Harness Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run harness compliance checks
        run: |
          # 1. HARNESS_QUALITY_REPORT.md exists and is not empty
          test -s HARNESS_QUALITY_REPORT.md || { echo "FAIL: HARNESS_QUALITY_REPORT.md missing or empty"; exit 1; }

          # 2. progress.json has features array (not sprint-level tracking)
          FEAT_COUNT=$(jq '.features | length' progress.json)
          [ "$FEAT_COUNT" -gt 0 ] || { echo "FAIL: progress.json has no features array or it is empty"; exit 1; }

          # 3. At least one feature has code_evaluator_verdict non-null
          EVAL_COUNT=$(jq '[.features[] | select(.code_evaluator_verdict != null)] | length' progress.json)
          [ "$EVAL_COUNT" -gt 0 ] || { echo "FAIL: No feature has a Code Evaluator verdict"; exit 1; }

          # 4. All sprint contracts S*.md are non-empty (>100 bytes)
          for f in sprint_contracts/S*.md; do
            [ -s "$f" ] || { echo "FAIL: $f is empty"; exit 1; }
            SIZE=$(wc -c < "$f")
            [ "$SIZE" -gt 100 ] || { echo "FAIL: $f is too small ($SIZE bytes) — contract is incomplete"; exit 1; }
          done

          # 5. session_state.json exists
          test -f session_state.json || { echo "FAIL: session_state.json missing"; exit 1; }

          # 6. harness_telemetry.jsonl exists and is non-empty
          test -s harness_telemetry.jsonl || { echo "FAIL: harness_telemetry.jsonl missing or empty"; exit 1; }

          echo "All harness checks passed."

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [harness-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [harness-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run tests with race detector
        run: go test -race -coverprofile=coverage.out ./...

      - name: Enforce coverage minimum (85%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          awk -v cov="$COVERAGE" 'BEGIN { if (cov+0 < 85.0) { print "FAIL: Coverage " cov "% is below 85% minimum"; exit 1 } else { print "PASS: Coverage " cov "%" } }'

      - name: Print coverage summary
        run: go tool cover -func=coverage.out

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  sec:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [harness-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run gosec
        run: gosec -exclude-dir=examples -severity high ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [harness-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build hsd
        run: go build ./cmd/hsd/

      - name: Build hyperspace-stat
        run: go build ./cmd/hyperspace-stat/

      - name: Build examples
        run: go build ./examples/...

  vuln:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [harness-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
